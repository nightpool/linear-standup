<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 220px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      margin: 0;
    }
    h2 {
      margin: 0 0 12px 0;
      font-size: 14px;
      color: #fff;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: #5e6ad2;
      color: #fff;
    }
    button:hover {
      background: #4e5bc2;
    }
    button:disabled {
      background: #444;
      cursor: default;
    }
    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #888;
      text-align: center;
    }
  </style>
</head>
<body>
  <h2>Linear Standup</h2>
  <button id="startBtn">Start Standup</button>
  <div id="status">Press to shuffle &amp; begin</div>
  <script src="popup.js"></script>
</body>
</html>
